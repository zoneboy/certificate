<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAN Certificate Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
      @media print {
        @page {
          size: A4 landscape;
          margin: 0;
        }
        body {
          margin: 0;
          padding: 0;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        /* Hide everything by default */
        body * {
          visibility: hidden;
        }
        /* Only show the certificate preview */
        #certificate-print-area, #certificate-print-area * {
          visibility: visible;
        }
        /* Force the print area to match the exact pixel dimensions of the certificate */
        #certificate-print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 1123px;
          height: 794px;
          margin: 0;
          padding: 0;
          display: block; /* Changed from flex to block to prevent layout clipping */
          background-color: white;
          z-index: 9999;
        }
        /* Ensure the scaler doesn't interfere with the browser's native print scaling */
        #certificate-scaler {
          transform: none !important;
          width: 1123px !important;
          height: 794px !important;
        }
      }
    </style>
